# Waline 评论系统 - 本地 MySQL 部署
# 使用方法：docker compose -f waline-docker-compose.yml up -d

services:
  # MySQL 数据库 - 存储评论数据
  waline-db:
    image: mysql:8.0
    container_name: waline-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-WalineRoot@2026}
      MYSQL_DATABASE: ${MYSQL_DB:-waline}
      MYSQL_USER: ${MYSQL_USER:-waline}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-WalineUser@2026}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_EXTERNAL_PORT:-3307}:3306"
    volumes:
      - ./data/waline-mysql:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - waline-network

  # Waline 评论服务端
  waline:
    image: waline:latest
    container_name: waline-server
    restart: unless-stopped
    depends_on:
      - waline-db
    environment:
      # 站点配置
      SITE_NAME: ${SITE_NAME:-wth2jhl.online}
      SITE_URL: ${SITE_URL:-https://wth2jhl.online}
      
      # 数据库配置 - 使用本地 MySQL
      MYSQL_HOST: waline-db
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DB:-waline}
      MYSQL_USER: ${MYSQL_USER:-waline}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-WalineUser@2026}
      
      # 服务配置
      PORT: ${PORT:-8383}
      
      # 安全配置
      SECURE: ${SECURE:-true}
      TOKEN: ${TOKEN:-WalineSecureToken2026ChangeMe}
      
      # 评论限制
      LIMIT_PER_MINUTE: ${LIMIT_PER_MINUTE:-10}
      LIMIT_ALL: ${LIMIT_ALL:-100}
      
      # 其他配置
      REGION: ${REGION:-CN}
      LANGUAGE: ${LANGUAGE:-zh-CN}
      
      # 邮件通知（可选）
      # MAIL_USER: ${MAIL_USER}
      # SMTP_SERVICE: ${SMTP_SERVICE}
      # SMTP_USER: ${SMTP_USER}
      # SMTP_PASS: ${SMTP_PASS}
    ports:
      - "${WALINE_EXTERNAL_PORT:-8383}:8383"
    networks:
      - waline-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8383"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  waline-network:
    driver: bridge

volumes:
  waline-mysql:
